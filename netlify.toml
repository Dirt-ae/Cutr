[build]
  command = "npm ci --prefix client && npm --prefix client run build"
  publish = "client/dist"

[[edge_functions]]
  path = "/*"
  function = "discord-og"

# Proxy backend routes to Render. This keeps the site working even if VITE_API_URL is not set.
[[redirects]]
  from = "/api/*"
  to = "https://cutr.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/embed/*"
  to = "https://cutr.onrender.com/embed/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/video-stream/*"
  to = "https://cutr.onrender.com/video-stream/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/thumb/*"
  to = "https://cutr.onrender.com/thumb/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/download/*"
  to = "https://cutr.onrender.com/download/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
