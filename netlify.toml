[build]
  base = "client"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[edge_functions]]
  path = "/*"
  function = "discord-og"

[[redirects]]
  from = "/api/*"
  to = "https://cutr.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/embed/*"
  to = "https://cutr.onrender.com/embed/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/hls/*"
  to = "https://cutr.onrender.com/hls/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/video-stream/*"
  to = "https://cutr.onrender.com/video-stream/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/thumb/*"
  to = "https://cutr.onrender.com/thumb/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/download/*"
  to = "https://cutr.onrender.com/download/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
