[build]
  command = "cd client && npm install && npm run build"
  publish = "client/dist"

[[edge_functions]]
  path = "/*"
  function = "discord-og"

# Proxy /embed/* to Railway backend for iframe player
[[redirects]]
  from = "/embed/:id"
  to = "https://cutr-production.up.railway.app/embed/:id"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
