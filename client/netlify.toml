[build]
  command = "npm ci && npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://cutr-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/embed/*"
  to = "https://cutr-production.up.railway.app/embed/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/video-stream/*"
  to = "https://cutr-production.up.railway.app/video-stream/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/thumb/*"
  to = "https://cutr-production.up.railway.app/thumb/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
