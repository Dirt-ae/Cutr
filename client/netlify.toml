[build]
  command = "npm ci && npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://cutr.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/embed/*"
  to = "https://cutr.onrender.com/embed/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/video-stream/*"
  to = "https://cutr.onrender.com/video-stream/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/thumb/*"
  to = "https://cutr.onrender.com/thumb/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
