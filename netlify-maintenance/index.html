<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-black h-screen flex items-center justify-center font-sans text-gray-900 dark:text-gray-100 overflow-hidden relative transition-colors duration-500">
    <div class="text-center p-8 backdrop-blur-md bg-white dark:bg-zinc-900/50 border border-black/5 dark:border-zinc-800/80 rounded-3xl shadow-lg dark:shadow-none max-w-sm mx-4 transition-all">
        <h1 class="text-4xl md:text-5xl font-bold tracking-tighter mb-4 bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-zinc-400 bg-clip-text text-transparent">
            Under Maintenance
        </h1>
        <p class="text-gray-600 dark:text-zinc-400 font-light text-sm md:text-base leading-relaxed">
            Our systems are currently undergoing a brief refresh. We'll be back online shortly.
        </p>
    </div>

    <button onclick="toggleTheme()" class="fixed bottom-6 right-6 px-3 py-1.5 text-xs font-medium border border-gray-300 dark:border-zinc-800 rounded-full bg-white/50 dark:bg-zinc-900/20 hover:bg-gray-100 dark:hover:bg-zinc-900 text-gray-500 hover:text-gray-800 dark:hover:text-zinc-300 transition-all active:scale-95 z-50">
        Toggle Theme
    </button>

    <script>
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
